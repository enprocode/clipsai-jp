[tool.black]
line-length = 88

[flake8]
max-line-length = 88
ignore =
    E203,
    E502,
    W503,
    W504,
    # 行長は Black に一任する（Black が分割できない長い文字列/URL のみ残るため）
    E501
per-file-ignores =
    # __init__.py は警告フィルタ設定のため、import を意図的にファイル冒頭以外へ置く
    clipsai_jp/__init__.py:E402
exclude =
    .git,
    __pycache__,
    env,
    build,
    dist,
    test_files