# Dependabot設定
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Python依存関係（requirements.txt / setup.py）
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # PRのノイズを減らすため、minor/patch更新は1つのPRにまとめる
    # （major更新は個別PRになるため、破壊的変更を個別にレビューできる）
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actionsのバージョン更新
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "github-actions"
