# This workflow will upload a Python Package to PyPI when a release is created
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      # GitHub ReleaseのタグとVERSIONファイルの一致を検証する
      # （タグと実際のパッケージバージョンがズレたまま公開する事故を防ぐ）
      - name: Verify release tag matches VERSION file
        run: |
          PKG_VERSION=$(tr -d '[:space:]' < VERSION)
          TAG_NAME="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_NAME#v}"  # 先頭の "v" は許容（v1.0.5 → 1.0.5）
          echo "VERSION file: $PKG_VERSION / Release tag: $TAG_NAME"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: Release tag '$TAG_NAME' does not match VERSION file '$PKG_VERSION'"
            exit 1
          fi

      - name: Build release distributions
        run: |
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      # PyPI project URL in the deployment status
      # GitHub Release name should match the PyPI package version (e.g., "1.0.0")
      url: https://pypi.org/project/clipsai-jp/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
