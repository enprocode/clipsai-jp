# Mergify設定
# https://docs.mergify.com/
#
# 前提: リポジトリに Mergify GitHub App のインストールが必要
# https://github.com/apps/mergify

queue_rules:
  - name: default
    # マージキューに入る条件 / マージされる条件
    # チェック名は .github/workflows/tests.yml の test ジョブ（matrix）に対応
    queue_conditions:
      - check-success=test (3.9)
      - check-success=test (3.12)
    merge_conditions:
      - check-success=test (3.9)
      - check-success=test (3.12)
    merge_method: merge

pull_request_rules:
  # Dependabotのminor/patch更新はCIが通れば自動マージ
  # （requirements.txt側で上限バージョンを固定しているため安全）
  #
  # ゲートはブランチ名で判定する:
  # .github/dependabot.yml の minor-and-patch グループには minor/patch 更新
  # しか含まれず、そのグループPRのブランチ名は dependabot/pip/minor-and-patch-*
  # になる。major更新は個別PR（ブランチ名が dependabot/pip/<依存名>-*）として
  # 作成されるため、この条件に一致せず必ず手動レビューになる。
  # （タイトルの正規表現による判定は不可: Dependabotのmajor更新タイトルは
  # 「Bump foo from 1.x to 2.0」形式で "major" という語を含まない）
  - name: Dependabot PRの自動マージ（minor/patchグループのみ）
    conditions:
      - author=dependabot[bot]
      - head~=^dependabot/pip/minor-and-patch-
      - check-success=test (3.9)
      - check-success=test (3.12)
    actions:
      queue:
        name: default

  # マージ済みブランチの自動削除
  - name: マージ後にブランチを削除
    conditions:
      - merged
    actions:
      delete_head_branch: {}

  # コンフリクトが発生したPRにラベルを付与してコメント
  - name: コンフリクト発生時に通知
    conditions:
      - conflict
      - -closed
    actions:
      label:
        add:
          - conflict
      comment:
        message: |
          このPRはmainとコンフリクトしています。リベースまたはマージで解消してください。
